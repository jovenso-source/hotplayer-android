name: Build & Release APK

on:
  push:
    tags:
      - 'v*'           # déclenché sur git tag v1.1.0, v1.2.0, etc.
  workflow_dispatch:   # déclenchement manuel depuis GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Extract version name
        id: ver
        run: |
          VER=$(grep 'versionName' app/build.gradle | grep -oP '"\K[^"]+')
          echo "name=$VER" >> $GITHUB_OUTPUT
          echo "Version: $VER"

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk hotplayer.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HotPlayer v${{ steps.ver.outputs.name }}"
          body: |
            ## 📦 HotPlayer v${{ steps.ver.outputs.name }}

            Installez l'APK sur votre Android TV en téléchargeant le fichier ci-dessous.

            **Lien direct :**
            `https://github.com/${{ github.repository }}/releases/latest/download/hotplayer.apk`
          files: hotplayer.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
