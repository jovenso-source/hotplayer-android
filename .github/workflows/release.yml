name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Restore keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/hotplayer.keystore

      - name: Build debug APK
        run: ./gradlew assembleDebug
        env:
          HOTPLAYER_KEYSTORE: /tmp/hotplayer.keystore
          STORE_PASSWORD:     android
          KEY_ALIAS:          androiddebugkey
          KEY_PASSWORD:       android

      - name: Extract version name
        id: ver
        run: |
          VER=$(grep 'versionName' app/build.gradle | grep -oP '"\K[^"]+')
          echo "name=$VER" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk hotplayer.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HotPlayer v${{ steps.ver.outputs.name }}"
          body: |
            ## 📦 HotPlayer v${{ steps.ver.outputs.name }}

            Installez l'APK sur votre Android TV.

            **Lien direct :**
            `https://github.com/${{ github.repository }}/releases/latest/download/hotplayer.apk`
          files: hotplayer.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
